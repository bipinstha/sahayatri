name: Commit & Push to GitHub

on:
  workflow_dispatch:  # Manual trigger - click "Run workflow" on GitHub Actions tab

jobs:
  commit-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create feature branch
        run: |
          BRANCH="feature/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH
          echo "FEATURE_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Commit all changes
        run: |
          git add -A
          git commit -m "feat: update code after local testing" || echo "No changes to commit"

      - name: Push to GitHub
        run: |
          git push origin $FEATURE_BRANCH

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: update code after local testing"
          title: "🔄 Code Review: Local Testing Complete"
          body: |
            ## Changes
            Code has been tested locally and is ready for review.
            
            **Steps taken:**
            - ✅ Tested locally
            - ✅ Committed changes
            - ✅ Pushed to GitHub
            
            Please review and merge if approved.
          base: main
          head: ${{ env.FEATURE_BRANCH }}
          labels: "review,tested"
          delete-branch: true